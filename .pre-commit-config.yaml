# Pre-commit configuration for Code Tutor
# Install pre-commit: pip install pre-commit
# Run: pre-commit install
# Or run manually: pre-commit run --all-files

repos:
  # C# formatting with CSharpier
  - repo: local
    hooks:
      - id: csharpier
        name: CSharpier Format
        entry: dotnet-csharpier
        language: system
        types: [c#]
        files: \.cs$
        pass_filenames: true

      - id: dotnet-build
        name: Dotnet Build Check
        entry: dotnet build native-app-wpf/CodeTutor.Wpf.csproj --no-restore
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: dotnet-test
        name: Dotnet Test Check
        entry: dotnet test native-app.Tests/native-app.Tests.csproj --no-restore --no-build
        language: system
        pass_filenames: false
        stages: [pre-push]

  # Prevent large files
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-yaml
        args: ['--unsafe']
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
        exclude: \.md$

  # Secret scanning with Gitleaks
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

# Configuration
default_stages: [pre-commit]
fail_fast: true
minimum_pre_commit_version: "3.0.0"
